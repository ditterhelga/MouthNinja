<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Mouth Ninja</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Nunito:wght@600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="page page--home">
    <header class="header">
      <div class="header-row">
        <h1 class="logo">Mouth Ninja</h1>
        <div class="header-actions">
          <div class="streak-pill" aria-live="polite">
            <span class="streak-text">🔥 0</span>
          </div>
          <a
            href="history.html"
            class="header-icon-link"
            aria-label="Open history"
            title="History"
            >📅</a>
        </div>
      </div>
    </header>

    <main class="main">
      <section class="session-card" aria-label="Current session">
        <div class="session-tabs" role="tablist" aria-label="Choose session">
          <button
            type="button"
            class="session-tab session-tab--active"
            role="tab"
            id="tab-morning"
            data-session="morning"
            aria-selected="true"
            aria-controls="task-list-panel"
          >
            Morning ninja
          </button>
          <button
            type="button"
            class="session-tab"
            role="tab"
            id="tab-evening"
            data-session="evening"
            aria-selected="false"
            aria-controls="task-list-panel"
          >
            Evening ninja
          </button>
        </div>
        <p class="session-progress" aria-live="polite">
          <span class="session-progress-count">0</span> / 7
        </p>
      </section>

      <p class="all-done-message" id="all-done-message" hidden></p>

      <ul class="task-list" id="task-list-panel" role="list" aria-labelledby="tab-morning"></ul>
    </main>
    <div
      id="reward-overlay"
      class="reward-overlay"
      hidden
      aria-hidden="true"
    >
      <div class="reward-dialog">
        <p class="reward-emoji" id="reward-emoji" aria-hidden="true"></p>
        <h2 class="reward-title">5 days in a row! 🔥</h2>
        <p class="reward-text">Amazing job. Show this to mom 👀</p>
        <button type="button" class="btn btn--primary" id="reward-dismiss">
          Yay!
        </button>
      </div>
    </div>
    <script type="module" src="js/app.js"></script>
  </body>
</html>
